<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <!-- Background circles -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" />
  <circle cx="100" cy="100" r="75" fill="url(#grad)" opacity="0.1" />
  
  <!-- Main circle -->
  <circle cx="100" cy="100" r="55" fill="url(#grad)" />
  
  <!-- Survey form icon - checkmark -->
  <path d="M75 100 L92 117 L128 83" 
        stroke="white" 
        stroke-width="8" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
  
  <!-- Form field indicators -->
  <rect x="68" y="60" width="64" height="4" rx="2" fill="white" opacity="0.4" />
  <rect x="68" y="70" width="48" height="4" rx="2" fill="white" opacity="0.3" />
  <rect x="68" y="80" width="56" height="4" rx="2" fill="white" opacity="0.3" />
  
  <!-- Bot/cursor indicator -->
  <circle cx="68" cy="60" r="3" fill="white" opacity="0.6" />
  <circle cx="68" cy="70" r="3" fill="white" opacity="0.5" />
  <circle cx="68" cy="80" r="3" fill="white" opacity="0.5" />
  
  <!-- Bottom accent lines -->
  <rect x="70" y="135" width="60" height="3" rx="1.5" fill="white" opacity="0.2" />
  <rect x="70" y="143" width="40" height="3" rx="1.5" fill="white" opacity="0.15" />
</svg>